pipelines:
  training:
    schedule: "0 2 * * *"
    max_active_runs: 1
    retries: 2
    retry_delay_minutes: 5
  drift_monitoring:
    schedule: "*/15 * * * *"
    drift_threshold: 0.15
    alert_channels: ["slack", "pagerduty"]
  auto_retrain:
    trigger: "drift_alert"
    min_samples: 10000
    validation_split: 0.2

mlflow:
  tracking_uri: "http://mlflow:5000"
  experiment_name: "production-models"
  model_registry_uri: "postgresql://mlflow:mlflow@postgres/mlflow"

model_registry:
  staging_validation_metrics:
    accuracy: 0.90
    f1_score: 0.88
    auc_roc: 0.92
  promotion_strategy: "champion_challenger"
  challenger_traffic_pct: 10

monitoring:
  prometheus_port: 8001
  grafana_port: 3000
  alert_rules:
    data_drift_threshold: 0.15
    model_performance_drop: 0.05
    prediction_latency_ms: 200
